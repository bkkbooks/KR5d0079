body:
  text: 頌曰學道須憑鐵漢便把身心割判一口咬斷無明更不前思後算重陽祖師修仙了性祕訣夫全真者是大道之清虛無為瀟灑之門户乃純正之家風是重陽之活計修仙之士學道之流愼勿狂遊而參禪且莫徒勞而問道羣居愼口纍真功獨坐防心積實行莫為小過而不除休言微行而不積心猿緊鎖意馬牢擒三逆散而神寧六賊勦而意定緩緩而抽添水火微微而調息真功清淨寂寥而低下謙和柔弱而煉心恭敬於人而有益般般勘破這行尸物物休停除走骨爭奈人人舌辨以為能箇箇剛強而為勝無明火大而為尊人我山高而獨是處衆不取其下鬧處不取其靜欲處而神荒動處而意亂更有一等專持乞食度日却言便是真修如此是慵饒下鬼愚頑不省之人迷迷無端之蠢切不如聞早煉頑心去假修真而了性若執慧性而皆昏精著心燈而忽暗慳吝而難成大道狠毒而怎悟玄真妬賢嫉能而招愆貪生怕死而造罪書符貨術而謾人行樂治病而圖賄狂怪道中之賊喧呼衆人之害不悟妙訣而胡遊心意迷迷而狂走受了十方善信供養而難消若謹修而了真心稍怠墮而沉地獄得遇真師強尋妙訣不許愚人得知只要人人自悟不用搖筋擺髓之功亦沒惑人採戰之術但會無為之初始自覺神氣而沖和自然丹爐而樂就顯現靈砂而照照明轍神光而燦燦自見道德之祖宗認是清間之源本乃性命之妙門是脫神仙之模子人人悟透此玄機乃得長生而久視不是惑言而説人亦非邪術而誘你酷告全真之高士奉勸世上之迷徒各各悟取害風言人人同登於正教如今説下修行之端的能絶羣迷之疑慮伏望人人離俗以登真一一斷塵而得道然願一切衆生皆登仙闕者矣答馬師父十四問第一問如何是思神不測處龍虎定相逢答曰那一切虛寂便是第二問如何玄牝之門是謂天地根答曰玄者父精牝者母血也元初各八兩合為一斤一點元陽真氣便是元本也第三問如何是復命歸根曰靜答曰只要心不逐物去不染不著心定意不散神不昧便是歸根若不此者不得歸根第四問如何見性答曰只要無心無念不著一切物澄澄湛湛內外無事乃是見性第五問如何是應物不昧答曰耳雖聽目雖視口雖説只要心不著也第六問如何是天關地軸如何得相守答曰天關地軸亦是神氣二字只要不著不染心定乃氣定心動則氣散若心不動則子母相守第七問如何是出有入無三尺劔長生不死一丸丹答曰出有入無只是一氣三尺劔慧也長生不死者一靈真性也一丸丹者命也只用清淨無心尋箇淨處坐去更無甚麼第八問如何是調息答曰非有作也若得心中無事氣息自調但知調息便是有著調息者只可不知見不可著於口鼻今日説與衆師兄别無甚麼只要心無事尋箇靜處坐去弟子只因心中無事得入於大道依此行去第九問如何是達摩大師云提得虛空回面覷答曰虛空是一性回頭覷不昧也第十問如何弟子晚年出家筋血衰敗願師指教答曰補去又問如何是補答曰只要頭頭無事萬緣都放下六門不交行只用一箇主人常少語不著物十二時中常不昧減省睡眠一時放下便是補也第十一問如何是鉛汞答曰鉛是父精汞是母血亦是性命龍虎二字第十二問處靜之間有一切念起或更昏睡多如何得念不起昏睡少答曰只是裏頭無物料神氣微細裏頭實有物自然無念不昏睡也第十三問如何是天地不測處鬼神不知處答曰那更有甚麼第十四問如何是十二時中似一時答曰不只十二時中似一時乃至千萬日稍有不似一時早是早斷滅也玄門雜寶十八問答全真夫全真者合天心之道也神不走氣不散精不漏三者俱備五行都聚四象安和為之全真也詩曰常行祖師教日用老君心鍊就真如性豈不是全真稽首珍重無表無裏內外真空無極太始通神獲祐太上家風長生不朽無想無存變化法界七寶林中重重輕輕不搖不動為之稽首珍重先生無法先有我輝輝不露形古今無改變豈不是先生道童道童元與大道同只因思世入凡籠如今意在青霄外萬法無拘與道通髼頭本是太上古家風一法才通萬法通放下絲毫無垢染自然一性合天公𩮎髻𩮎髻元是鍾離留崑崙頂上安日頭沒人攪洗常山去陸地從來放白牛冠一對星眼覷前後萬法收來復內藏內外玲瓏無顯迹輝輝獨顯路堂堂袍落𩲸元初不計春衣寬廣大裹乾坤隔斷紅塵不染體任他寒暑不能侵四䙎春夏秋冬按四䙎包羅萬象有誰知酒色財氣塵俗事四件皆除絶是非笠獨占崑崙頂上懸圓光一道照無邊任他風雨並霜雪一塔權為不漏天絛來往循環得幾遭顛猿劣馬緊拴牢萬縷千絲俱放下生死輪回決要逃遮袋縱橫三尺布誰知造化工此中超法界包裹太虛空拐堅起頂天立地橫擔日月山河斡轉乾坤骨髓轉動萬象森羅鉢一鉢千家飯孤身萬里遊為逃生死路乞化度春秋鞋步步隨吾不記年往來踏遍舊山川從今不踏泥共水一任雙飛過碧天來去來從大道來去從本道去來去不沾塵當居清靜處出家修行一自離塵是出家無為無作我生涯若人問我修行訣雲散青天月自華日用養性忘情為日用沿門乞化是生涯來去自由無罣礙清風明月作鄰家頌曰神仙本是世人求誰肯心頭萬事休若悟自家真性命清風明月共同遊水龍吟本自出家離塵世更不貪人間華利髼頭垢面終朝獨坐內修活計古廟窑龕裏任教他紅輪西墜向無中認有知白守黑綿綿的默調息心上别無縈繫有腋袋拄杖相隨草鞋斷𦭰精膁赤腿羊皮遮體飢後巡門乞飽來時唱哩嗹囉哩任傍人笑道呆癡懶漢有誰人識學道心剛似鐵全然在自家猛烈頓開利鎖名韁割斷愛情盡捨萬事無挂惹也不住茅庵草舍向市廛中居止端然守道憑此用過時月作箇貧窮道者任粗食不顧寒熱髼頭垢面終朝獨坐內修活業得遇明師訣世人道風狂來也有些深逺幽微時節教七歌怎生説頌曰獨上高山望八都黑雲散盡月輪孤茫茫宇宙人無數那箇男兒是丈夫解紅洞天深處道非逺咫尺人難悟浮沉內景須憑匠手功夫專候曉來一點陽生通玄路盡藏在碧波深深處任事主地雷響震動山頭雨漸澆灌黃芽乍離上嬰兒採得携籃去向真霞六陽鼎內烹煮搬運轉東西與南北鋪八卦九宫要知宗祖十干數內分左右要顯龍虎玄武後隨朱雀當先祥雲布曲江上萬神都來聚夫與歸癸母跨赤龍歸洞府要尋覓丁公問憑居陰陽會合三千數指天地海山同壽堅固詩曰黃河水轉吕氏家一壺天地老煙霞無情白鹿調朱鳯有箇烏龜纏赤蛇六月山頭飛白雪三冬水底長黃芽這些道理人還會陸地神仙亂似麻緑頭鴨話中常悟南柯一夢黃糧破繁華雲龕布素認宗派返照回光憑慧劔劈開愛網橫藜杖擊碎塵寰那里相逢峨眉時任韜光速奔華山忙林泉隱南辰於北斗日月袖中藏朱顔久天崩地塌真性如常舞袍袖乾坤恨窄但展手天地平量醉陶陶囊盛四海笑欣欣腹飲三鐘幾度瑶池龍華會上諸仙珍席醉倒霞觴玉皇御宴無我不成班行重陽會金蓮七朵齊放神光頌曰淨皎皎圓明皓月明朗朗水磨孤圓緑湛湛碧潭現影韻悠悠物外天仙滴溜溜拈出無有活潑潑放下周全轉漉漉水晶盤中赤灑灑一片青天頌曰玉京山上一池水四面八方不得底若還認得把舟人自然運入天宫裏𣈆真人語録
