front:
  text: 𣈆眞人語録先生曰開闢已來至於今日這人沉淪無有休期此時正遇神仙出世大道將興雖一槩天民爭奈賢愚不等賢者向道愚者背道向道而生背道而死心清意靜天堂之路心荒意亂地獄之門試問諸公上天堂好入地獄好雖然道之尊德之貴豈爲迷愚說哉若非今世道教興安得使清淨天機漏泄於世間取聦明上士先生曰人之修行先須識取性命宗祖然後眞以保命修行須存三抱元守一爲初存三者乃是精炁神眞三寶也抱元者抱守元陽眞炁守一者守其一靈神也神者元本在心心屬南方丙丁火心中有性性屬陽腎者能生元陽眞炁炁屬北方壬癸水水爲命命屬陰已上說性命明知下落自古及今人多不識性命今日顯揚於世先生曰學道本來有三一者一心在想秪在下丹田仙洞之内莫放心意散亂抱元陽眞炁便是長生眞道本也是出死入生之道是陰陽造化仙爐也這丹田内澄心定意昏昏默默綿綿不斷謹守三五年之間自然丹爐鼎内二炁相交温成一炁造化成虛無靈胎仙成器心中神自靈踊躍歡喜自歌自舞大抵神得炁靈炁得神清陰符經云聖功生焉神明岀焉炁是神之母神是炁之子常使子母相守不離自然日久神定仙道成矣二者旣得然後放四大莫把捉坦然修養道炁自然清清淨淨之中神即上靈宫永作目前更不迴顧也三者旣得神定炁和應過天年也放心坦蕩自在逍遥無事清閑乃是無極大道成也清淨到頭異日功成行滿玉皇詔上會作箇無礙人長生快樂也先生曰學道修行或活神不定秪是功夫未成不計年限且須抱守吕眞人云莫言大道人難得自是功夫不到頭先生曰夫修行施以不謹功不勤而神不清持久不負眞行心不勞而志不狂精不虧而神不飛先生曰嗟見世間人尋師訪道不肯恭順於人只說俱能已勝至於修行又不肯勤謹愼忍只憑口說全無眞功亦不眞緊修行以見貧者又無拯救之心種種虧功失行到使陰德有虧於道有違似此之徒欲要成仙證道甚逺矣哉如今略說道果之因上天只秪祐眞功眞行如大善德之人自可感動天地經云皇天無親惟德是輔若要眞功者須是澄心定意打疊精神無動無作眞清眞淨抱元守一存神固炁乃眞功也若要眞行須要修行藴德濟貧拔苦見人患難常懷拯救之心或化誘善人入道修行所爲之事先人後己與萬物無私乃眞行也先生曰若人修行養命先須積行累功有功無行道果難成功行兩全是謂眞人先生曰吾輩說與教門中人須是大悟性理深窮妙道志在修行學仙西昇經云除垢止念淨心守一衆垢除萬事畢吾道之要也此乃妙中無比也凡有道話徃來且照顧潤身中之寶勸人向天之道順天之理不得毁天謗地若張淵子背口發狂言歸談神中事此乃得道之人也但且包容不得其過先生曰學道之人切須清淨一身不得殺生飲酒食肉破戒犯色每欲包容萬事苦巳饒人棄絶嗔怒慳貪常行忍辱儉約見人患難行拯苦之心見人貧乏必周急之好事先人後己待人謙上和下以恩復讎勿見人之過勿語人之非暗積陰德不求人知惟望天察乃即其道人也先生曰大道無方微妙莫測聖人體之爲日用百姓日用而不知背道而喪眞動感死地殊不知人在道中如魚在水中魚失水則死人失道則亡先生曰且見經典中言意隱奥卒難曉解今秪以世俗之語開迷指悟或有未明更於後代之子孫處求教儻能解意修行即許再傳弟子保命修眞積慶天涯救人疾痾爲大行若受斯文則九祖滅罪父母獲福吾之願心普救病厄及生死之難如將此語誑諸人永入陰山萬劫
  hash: sha256:2851a99e41170c22f5036b94a504b13f9d651860ba1458d39198c37fb9d739dd
